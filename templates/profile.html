<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EasyJobs — Your Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e1a; --surface:#0e1726; --card:#111f35;
  --border:#1a2d4a; --border2:#243d5e;
  --teal:#14b8a6; --teal2:#0d9488;
  --text:#f1f5f9; --muted:#94a3b8; --muted2:#64748b;
  --red:#ef4444; --green:#22c55e;
  --radius:14px;
}
html,body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
.site-header{
  height:60px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  flex-shrink:0;position:relative;
}
.site-header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--teal),#3b82f6,#f59e0b);
}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px;letter-spacing:-.3px;text-decoration:none}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#3b82f6,#14b8a6);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px rgba(99,102,241,.35)}
.logo-icon i{color:#fff;font-size:14px}
.logo .easy{color:var(--text)}
.logo .jobs{color:var(--teal)}
.header-back{color:var(--muted);font-size:13px;text-decoration:none;
  display:flex;align-items:center;gap:6px;transition:color .2s}
.header-back:hover{color:var(--teal)}

.page-wrap{max-width:560px;margin:0 auto;padding:32px 20px 40px}

/* Avatar */
.avatar-section{text-align:center;margin-bottom:28px}
.avatar{width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,#6366f1,#a855f7);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:700;color:#fff;margin-bottom:12px;
  box-shadow:0 8px 24px rgba(99,102,241,.35)}
.user-mobile{color:var(--muted);font-size:14px}

/* Progress bar */
.progress-bar{height:4px;background:var(--border);border-radius:4px;margin-bottom:28px;overflow:hidden}
.progress-fill{height:100%;background:var(--teal);border-radius:4px;transition:width .4s ease}

/* Form cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px;margin-bottom:20px}
.card-title{font-size:11px;font-weight:700;color:var(--muted2);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:20px;
  display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:14px;background:var(--teal);border-radius:2px}

.field{margin-bottom:20px}
label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:7px}
label span.req{color:var(--red)}

input[type=text],input[type=number],select{
  width:100%;padding:12px 14px;border:1.5px solid var(--border2);border-radius:10px;
  background:var(--surface);color:var(--text);font-size:15px;
  font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;
  -webkit-appearance:none;
}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--teal)}
input[type=text]::placeholder,input[type=number]::placeholder{color:var(--muted2)}
select option{background:var(--card)}

.row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Gender chips */
.gender-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.g-chip{
  padding:8px 16px;border:1.5px solid var(--border2);border-radius:8px;
  cursor:pointer;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;
  transition:all .2s;user-select:none;color:var(--muted);
}
.g-chip:hover{border-color:var(--teal);color:var(--teal)}
.g-chip.active{background:var(--teal);border-color:var(--teal);color:#000;font-weight:600}
input[name="gender"]{display:none}

/* City search */
.city-wrap{position:relative}
.city-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--card);border:1px solid var(--border2);border-radius:10px;
  max-height:220px;overflow-y:auto;z-index:100;display:none;
  box-shadow:0 8px 30px rgba(0,0,0,.4);
}
.city-dropdown.show{display:block}
.city-option{padding:10px 14px;cursor:pointer;font-size:14px;transition:background .1s}
.city-option:hover,.city-option.focused{background:var(--surface);color:var(--teal)}
.city-option mark{background:rgba(20,184,166,.2);color:var(--teal);border-radius:3px;padding:0 1px}

/* Save button */
.btn{
  width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;
  font-family:'Inter',sans-serif;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;
}
.btn-primary{background:var(--teal);color:#000}
.btn-primary:hover{background:var(--teal2);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.msg{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:20px;display:none;line-height:1.5}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.msg.success{background:rgba(20,184,166,.1);border:1px solid rgba(20,184,166,.25);color:#5eead4}

.field-error{font-size:12px;color:var(--red);margin-top:4px}

.spinner{width:18px;height:18px;border:2.5px solid rgba(0,0,0,.25);
  border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header class="site-header">
  <a href="/" class="logo">
    <div class="logo-icon"><i class="fa fa-briefcase"></i></div>
    <span><span class="easy">Easy</span><span class="jobs">Jobs</span></span>
  </a>
  <a href="/" class="header-back"><i class="fa fa-arrow-left"></i> Back to Jobs</a>
</header>

<div class="page-wrap">

  <!-- Progress -->
  <div class="progress-bar">
    <div class="progress-fill" id="progress" style="width:0%"></div>
  </div>

  <div class="avatar-section">
    <div class="avatar" id="avatar-initials">
      {% if user and user.name %}{{ user.name[0].upper() }}{% else %}<i class="fa fa-user"></i>{% endif %}
    </div>
    <div class="user-mobile">+{{ user.mobile if user else '' }}</div>
    {% if user and user.is_complete %}
    <div style="margin-top:8px;color:#5eead4;font-size:13px">
      <i class="fa fa-check-circle"></i> Profile complete
    </div>
    {% endif %}
  </div>

  <div id="msg" class="msg"></div>

  <form id="profile-form" onsubmit="saveProfile(event)">
    <div class="card">
      <div class="card-title">Personal Details</div>

      <div class="field">
        <label>Full Name <span class="req">*</span></label>
        <input type="text" id="name" name="name" placeholder="Your full name"
               value="{{ user.name or '' }}" oninput="updateProgress()">
        <div class="field-error" id="err-name"></div>
      </div>

      <div class="row-2">
        <div class="field">
          <label>Age <span class="req">*</span></label>
          <input type="number" id="age" name="age" placeholder="e.g. 25"
                 min="14" max="80" value="{{ user.age or '' }}" oninput="updateProgress()">
          <div class="field-error" id="err-age"></div>
        </div>
        <div class="field">
          <label>Qualification <span class="req">*</span></label>
          <select id="qualification" name="qualification" onchange="updateProgress()">
            <option value="">Select…</option>
            {% for q in qualifications %}
            <option value="{{ q }}" {% if user and user.qualification == q %}selected{% endif %}>{{ q }}</option>
            {% endfor %}
          </select>
          <div class="field-error" id="err-qualification"></div>
        </div>
      </div>

      <div class="field">
        <label>Gender <span class="req">*</span></label>
        <input type="hidden" id="gender" name="gender"
               value="{{ user.gender or '' }}">
        <div class="gender-chips" id="gender-chips">
          {% for g in genders %}
          <div class="g-chip {% if user and user.gender == g %}active{% endif %}"
               onclick="selectGender('{{ g }}')">{{ g }}</div>
          {% endfor %}
        </div>
        <div class="field-error" id="err-gender"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Location</div>
      <div class="field">
        <label>City <span class="req">*</span></label>
        <div class="city-wrap">
          <input type="text" id="city-search" class="city-input"
                 placeholder="Type to search city…"
                 value="{{ user.city or '' }}"
                 autocomplete="off"
                 oninput="filterCities(this.value)"
                 onfocus="showCityDrop()"
                 onblur="hideCityDrop()">
          <input type="hidden" id="city" name="city" value="{{ user.city or '' }}">
          <div class="city-dropdown" id="city-drop"></div>
        </div>
        <div class="field-error" id="err-city"></div>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" id="btn-save">
      <i class="fa fa-save"></i> Save Profile
    </button>
  </form>
</div>

<script>
const CITIES = {{ cities | tojson }};

/* ── Gender chips ── */
function selectGender(g) {
  document.getElementById('gender').value = g;
  document.querySelectorAll('.g-chip').forEach(c => {
    c.classList.toggle('active', c.textContent.trim() === g);
  });
  updateProgress();
}

/* ── City autocomplete ── */
let cityTimeout;
let currentCityFocusIdx = -1;

function filterCities(q) {
  clearTimeout(cityTimeout);
  cityTimeout = setTimeout(() => {
    const drop = document.getElementById('city-drop');
    if (!q.trim()) { drop.innerHTML=''; drop.classList.remove('show'); return; }
    const matches = CITIES.filter(c => c.toLowerCase().startsWith(q.toLowerCase())).slice(0,12);
    if (!matches.length) { drop.innerHTML=''; drop.classList.remove('show'); return; }
    const re = new RegExp('^(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'i');
    drop.innerHTML = matches.map((c,i) =>
      `<div class="city-option" data-city="${c}" onmousedown="selectCity('${c}')">${c.replace(re,'<mark>$1</mark>')}</div>`
    ).join('');
    drop.classList.add('show');
    currentCityFocusIdx = -1;
  }, 120);
}

function selectCity(city) {
  document.getElementById('city-search').value = city;
  document.getElementById('city').value = city;
  document.getElementById('city-drop').classList.remove('show');
  updateProgress();
}
function showCityDrop() {
  filterCities(document.getElementById('city-search').value);
}
function hideCityDrop() {
  // Small delay to allow click to register
  setTimeout(() => document.getElementById('city-drop').classList.remove('show'), 200);
}

/* Keyboard nav for city dropdown */
document.getElementById('city-search').addEventListener('keydown', e => {
  const items = document.querySelectorAll('.city-option');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    currentCityFocusIdx = Math.min(currentCityFocusIdx+1, items.length-1);
    items.forEach((el,i) => el.classList.toggle('focused', i===currentCityFocusIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    currentCityFocusIdx = Math.max(currentCityFocusIdx-1, 0);
    items.forEach((el,i) => el.classList.toggle('focused', i===currentCityFocusIdx));
  } else if (e.key === 'Enter' && currentCityFocusIdx >= 0) {
    e.preventDefault();
    selectCity(items[currentCityFocusIdx].dataset.city);
  }
});

/* ── Progress bar ── */
function updateProgress() {
  const fields = [
    document.getElementById('name').value.trim(),
    document.getElementById('age').value.trim(),
    document.getElementById('qualification').value,
    document.getElementById('gender').value,
    document.getElementById('city').value,
  ];
  const filled = fields.filter(Boolean).length;
  document.getElementById('progress').style.width = (filled/fields.length*100) + '%';
  // Update avatar initial
  const name = document.getElementById('name').value.trim();
  const av = document.getElementById('avatar-initials');
  av.innerHTML = name ? name[0].toUpperCase() : '<i class="fa fa-user"></i>';
}

/* ── Save profile ── */
async function saveProfile(e) {
  e.preventDefault();
  // Clear errors
  ['name','age','gender','qualification','city'].forEach(f => {
    const el = document.getElementById('err-'+f);
    if(el) el.textContent='';
  });

  const data = {
    name:          document.getElementById('name').value.trim(),
    age:           document.getElementById('age').value,
    gender:        document.getElementById('gender').value,
    qualification: document.getElementById('qualification').value,
    city:          document.getElementById('city').value,
  };

  const btn = document.getElementById('btn-save');
  btn._txt = btn.innerHTML;
  btn.innerHTML = '<span class="spinner"></span> Saving…';
  btn.disabled = true;

  try {
    const r = await fetch('/profile', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    const d = await r.json();
    if (!d.ok) {
      (d.errors || []).forEach(err => {
        const field = err.toLowerCase().includes('name') ? 'name'
          : err.toLowerCase().includes('age') ? 'age'
          : err.toLowerCase().includes('gender') ? 'gender'
          : err.toLowerCase().includes('qualif') ? 'qualification'
          : err.toLowerCase().includes('city') ? 'city' : null;
        if (field) { const el = document.getElementById('err-'+field); if(el) el.textContent=err; }
      });
      showMsg(d.errors ? d.errors.join(' · ') : 'Please fix the errors', 'error');
      btn.innerHTML = btn._txt; btn.disabled = false;
      return;
    }
    showMsg('Profile saved! 🎉', 'success');
    document.getElementById('progress').style.width = '100%';
    setTimeout(() => { window.location.href = d.redirect; }, 1000);
  } catch(err) {
    showMsg('Network error. Try again.', 'error');
    btn.innerHTML = btn._txt; btn.disabled = false;
  }
}

function showMsg(text, type='error') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
  if (type === 'success') return;
  setTimeout(() => { el.style.display='none'; }, 5000);
}

/* Init progress on load */
updateProgress();
</script>
</body>
</html>
