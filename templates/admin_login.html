<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EasyJobs Admin</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;
  --muted:#94a3b8;--accent:#6366f1}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui;
  min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:40px;width:100%;max-width:360px;text-align:center}
h2{color:var(--accent);margin-bottom:24px;font-size:22px}
input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;
  background:#263348;color:var(--text);font-size:16px;outline:none;margin-bottom:16px}
input:focus{border-color:var(--accent)}
button{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;
  border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
button:hover{opacity:.9}
p{color:var(--muted);font-size:13px;margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <h2>🔐 Admin Access</h2>
  <form action="/admin" method="get">
    <input type="password" name="key" placeholder="Enter admin key" autofocus>
    <button type="submit">Enter Dashboard</button>
  </form>
  <p>Set ADMIN_KEY environment variable to change the access key</p>
</div>
</body>
</html>
